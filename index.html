<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>convite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #FFDDF9;
    overflow: hidden;
    font-family: sans-serif;
  }
  /* palco fixo 960x540 (mesma proporcao do ppt) escalado pra caber na tela */
  #viewport {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #stage {
    position: relative;
    width: 960px; height: 540px;
    background: #FFDDF9;
    transform-origin: center center;
  }
  .slide {
    position: absolute; inset: 0;
    width: 960px; height: 540px;
    display: none;
  }
  .slide.active { display: block; }
  .bg {
    position: absolute; inset: 0;
    width: 960px; height: 540px;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }
  /* quadros cumulativos da tela 1 (cross-fade) */
  .frame {
    position: absolute; inset: 0;
    width: 960px; height: 540px;
    opacity: 0;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }
  #f00 { opacity: 1; }                 /* base: fundo + botao, sempre visivel */
  #stage.play .frame { animation: fadein 1000ms ease forwards; }
  #stage.play #f01 { animation-delay: 0ms; }
  #stage.play #f02 { animation-delay: 1000ms; }
  #stage.play #f03 { animation-delay: 2000ms; }
  #stage.play #f04 { animation-delay: 3000ms; }
  #stage.play #f05 { animation-delay: 4000ms; }
  #stage.play #f06 { animation-delay: 5000ms; }
  #stage.play #f07 { animation-delay: 6000ms; }
  #stage.play #f08 { animation-delay: 7000ms; }
  #stage.play #f09 { animation-delay: 8000ms; }
  #stage.play #f10 { animation-delay: 9000ms; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  /* areas clicaveis (invisiveis, por cima dos botoes desenhados no ppt) */
  .hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    border: none;
    border-radius: 10px;
  }
  .hotspot:focus { outline: none; }
  #hsNext { left: 769.87px; top: 482.68px; width: 158.24px; height: 48.09px; }
  #hsSim  { left: 300.91px; top: 288.87px; width: 137.86px; height: 51.06px; }
  #hsAcc  { left: 500.74px; top: 288.87px; width: 137.86px; height: 51.06px; }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">

    <!-- TELA 1: 8 fotos formam o coracao, depois o texto e a setinha -->
    <section class="slide active" id="slide1">
      <img class="frame" id="f00" src="assets/frame00.png" alt="">
      <img class="frame" id="f01" src="assets/frame01.png" alt="">
      <img class="frame" id="f02" src="assets/frame02.png" alt="">
      <img class="frame" id="f03" src="assets/frame03.png" alt="">
      <img class="frame" id="f04" src="assets/frame04.png" alt="">
      <img class="frame" id="f05" src="assets/frame05.png" alt="">
      <img class="frame" id="f06" src="assets/frame06.png" alt="">
      <img class="frame" id="f07" src="assets/frame07.png" alt="">
      <img class="frame" id="f08" src="assets/frame08.png" alt="">
      <img class="frame" id="f09" src="assets/frame09.png" alt="">
      <img class="frame" id="f10" src="assets/frame10.png" alt="">
      <button class="hotspot" id="hsNext" aria-label="proxima pagina" onclick="go(2)"></button>
    </section>

    <!-- TELA 2 -->
    <section class="slide" id="slide2">
      <img class="bg" src="assets/slide2.png" alt="">
      <button class="hotspot" id="hsSim" aria-label="simm" onclick="go(3)"></button>
      <button class="hotspot" id="hsAcc" aria-label="aceito" onclick="go(3)"></button>
    </section>

    <!-- TELA 3 -->
    <section class="slide" id="slide3">
      <img class="bg" src="assets/slide3.png" alt="">
    </section>

  </div>
</div>

<script>
  var stage = document.getElementById('stage');

  function resize() {
    var s = Math.min(window.innerWidth / 960, window.innerHeight / 540);
    stage.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', resize);
  resize();

  function go(n) {
    for (var i = 1; i <= 3; i++) {
      document.getElementById('slide' + i).classList.remove('active');
    }
    document.getElementById('slide' + n).classList.add('active');
  }

  // dispara as animacoes da tela 1 ao abrir
  window.addEventListener('load', function () {
    requestAnimationFrame(function () { stage.classList.add('play'); });
  });
</script>
</body>
</html>
